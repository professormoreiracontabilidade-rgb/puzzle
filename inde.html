<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tetris de Blocos - Professor Moreira</title>
  <style>
    * { box-sizing: border-box; }
    :root{
      --bg:#07111f;
      --panel:#0f1f35;
      --panel2:#162b46;
      --text:#ffffff;
      --muted:#9fb3c8;
      --accent:#ffb703;
      --danger:#ef476f;
      --ok:#06d6a0;
    }
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#06101d,#0b1830);
      color:var(--text);
      display:flex;
      justify-content:center;
      overscroll-behavior:none;
      touch-action:manipulation;
    }
    .app{
      width:100%;
      max-width:520px;
      padding:12px;
    }
    .header{
      background:var(--panel);
      border:2px solid var(--accent);
      border-radius:18px;
      padding:12px;
      text-align:center;
      box-shadow:0 8px 24px rgba(0,0,0,.25);
      margin-bottom:10px;
    }
    .header h1{
      margin:0;
      font-size:22px;
      color:var(--accent);
      letter-spacing:.5px;
    }
    .header p{
      margin:4px 0 0;
      font-size:13px;
      color:var(--muted);
    }
    .game-wrap{
      display:grid;
      grid-template-columns:1fr 120px;
      gap:10px;
      align-items:start;
    }
    .board-card{
      background:var(--panel);
      border-radius:18px;
      padding:8px;
      box-shadow:0 8px 24px rgba(0,0,0,.25);
    }
    canvas{
      width:100%;
      height:auto;
      display:block;
      background:#020812;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      image-rendering:pixelated;
    }
    .sidebar{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .info-card{
      background:var(--panel);
      border-radius:16px;
      padding:10px;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }
    .label{
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.8px;
    }
    .value{
      font-size:24px;
      font-weight:bold;
      color:var(--accent);
      margin-top:2px;
    }
    #next{
      width:100%;
      aspect-ratio:1/1;
      background:#020812;
      border-radius:10px;
      margin-top:6px;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:12px 8px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      color:#111827;
      background:var(--accent);
      box-shadow:0 5px 0 #c98c00;
    }
    .btn:active{ transform:translateY(2px); box-shadow:0 3px 0 #c98c00; }
    .btn.secondary{
      background:#dbeafe;
      box-shadow:0 5px 0 #93c5fd;
    }
    .controls{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }
    .control{
      border:none;
      min-height:58px;
      border-radius:15px;
      background:var(--panel2);
      color:#fff;
      font-size:26px;
      font-weight:bold;
      box-shadow:0 5px 0 #081424;
      touch-action:none;
      user-select:none;
    }
    .control:active{ transform:translateY(2px); box-shadow:0 3px 0 #081424; background:#1d3b61; }
    .control.wide{ grid-column:span 2; font-size:18px; }
    .hint{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin:10px 0 4px;
      line-height:1.4;
    }
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:10;
    }
    .overlay.show{ display:flex; }
    .modal{
      width:min(92vw,360px);
      background:var(--panel);
      border:2px solid var(--accent);
      border-radius:22px;
      padding:22px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .modal h2{ margin:0 0 8px; color:var(--accent); }
    .modal p{ color:var(--muted); }
    @media(max-width:390px){
      .game-wrap{ grid-template-columns:1fr 104px; }
      .value{ font-size:20px; }
      .header h1{ font-size:19px; }
      .control{ min-height:54px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>PUZZLE DE BLOCOS</h1>
      <p>SOFIA MOREIRA</p>
    </div>

    <div class="game-wrap">
      <div class="board-card">
        <canvas id="game" width="300" height="600"></canvas>
      </div>

      <div class="sidebar">
        <div class="info-card">
          <div class="label">Pontuação</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="info-card">
          <div class="label">Linhas</div>
          <div class="value" id="lines">0</div>
        </div>
        <div class="info-card">
          <div class="label">Nível</div>
          <div class="value" id="level">1</div>
        </div>
        <div class="info-card">
          <div class="label">Próxima peça</div>
          <canvas id="next" width="100" height="100"></canvas>
        </div>
        <button class="btn" id="pauseBtn">Pausar</button>
        <button class="btn secondary" id="restartBtn">Reiniciar</button>
      </div>
    </div>

    <div class="controls">
      <button class="control" data-action="left">◀</button>
      <button class="control" data-action="rotate">⟳</button>
      <button class="control" data-action="right">▶</button>
      <button class="control wide" data-action="down">▼ Descer</button>
      <button class="control" data-action="drop">⤓</button>
    </div>

    <div class="hint">
      Teclado: setas para mover, seta para cima para girar, espaço para queda rápida e P para pausar.
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">Fim de jogo</h2>
      <p id="modalText">Sua pontuação foi 0.</p>
      <button class="btn" id="playAgainBtn">Jogar novamente</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nextCtx = nextCanvas.getContext('2d');

  const COLS = 10, ROWS = 20, BLOCK = 30;
  const colors = [
    null,
    '#00f5d4', // I
    '#fee440', // O
    '#9b5de5', // T
    '#00bbf9', // J
    '#f15bb5', // L
    '#00f5a0', // S
    '#ff595e'  // Z
  ];

  const pieces = [
    [[1,1,1,1]],
    [[2,2],[2,2]],
    [[0,3,0],[3,3,3]],
    [[4,0,0],[4,4,4]],
    [[0,0,5],[5,5,5]],
    [[0,6,6],[6,6,0]],
    [[7,7,0],[0,7,7]]
  ];

  let board, player, nextPiece, score, lines, level;
  let dropCounter = 0, lastTime = 0, paused = false, gameOver = false;
  let animationId;

  function createBoard(){
    return Array.from({length:ROWS}, () => Array(COLS).fill(0));
  }

  function randomPiece(){
    const matrix = pieces[Math.floor(Math.random()*pieces.length)].map(r=>r.slice());
    return { matrix, pos:{x:0,y:0} };
  }

  function resetPlayer(){
    player = nextPiece || randomPiece();
    nextPiece = randomPiece();
    player.pos.y = 0;
    player.pos.x = Math.floor(COLS/2) - Math.ceil(player.matrix[0].length/2);
    drawNext();

    if(collide(board, player)){
      gameOver = true;
      paused = true;
      document.getElementById('modalTitle').textContent = 'Fim de jogo';
      document.getElementById('modalText').textContent = `Sua pontuação foi ${score}.`;
      document.getElementById('overlay').classList.add('show');
    }
  }

  function collide(board, p){
    const m = p.matrix, o = p.pos;
    for(let y=0;y<m.length;y++){
      for(let x=0;x<m[y].length;x++){
        if(m[y][x] !== 0 &&
          (board[y+o.y] && board[y+o.y][x+o.x]) !== 0){
          return true;
        }
      }
    }
    return false;
  }

  function merge(){
    player.matrix.forEach((row,y)=>{
      row.forEach((value,x)=>{
        if(value!==0) board[y+player.pos.y][x+player.pos.x]=value;
      });
    });
  }

  function rotate(matrix){
    for(let y=0;y<matrix.length;y++){
      for(let x=0;x<y;x++){
        [matrix[x][y],matrix[y][x]]=[matrix[y][x],matrix[x][y]];
      }
    }
    matrix.forEach(row=>row.reverse());
  }

  function playerRotate(){
    const oldX = player.pos.x;
    let offset = 1;
    rotate(player.matrix);
    while(collide(board,player)){
      player.pos.x += offset;
      offset = -(offset + (offset>0?1:-1));
      if(Math.abs(offset)>player.matrix[0].length){
        rotate(player.matrix);
        rotate(player.matrix);
        rotate(player.matrix);
        player.pos.x = oldX;
        return;
      }
    }
  }

  function playerMove(dir){
    if(paused || gameOver) return;
    player.pos.x += dir;
    if(collide(board,player)) player.pos.x -= dir;
  }

  function playerDrop(){
    if(paused || gameOver) return;
    player.pos.y++;
    if(collide(board,player)){
      player.pos.y--;
      merge();
      sweep();
      resetPlayer();
    }
    dropCounter = 0;
  }

  function hardDrop(){
    if(paused || gameOver) return;
    let distance = 0;
    while(!collide(board,player)){
      player.pos.y++;
      distance++;
    }
    player.pos.y--;
    distance--;
    score += Math.max(0,distance)*2;
    merge();
    sweep();
    resetPlayer();
    updateInfo();
  }

  function sweep(){
    let rowCount = 0;
    outer: for(let y=board.length-1;y>=0;y--){
      for(let x=0;x<board[y].length;x++){
        if(board[y][x]===0) continue outer;
      }
      const row = board.splice(y,1)[0].fill(0);
      board.unshift(row);
      y++;
      rowCount++;
    }

    if(rowCount>0){
      const points=[0,100,300,500,800];
      score += points[rowCount]*level;
      lines += rowCount;
      level = 1 + Math.floor(lines/10);
      updateInfo();
    }
  }

  function drawMatrix(matrix, offset, context, blockSize){
    matrix.forEach((row,y)=>{
      row.forEach((value,x)=>{
        if(value!==0){
          context.fillStyle = colors[value];
          context.fillRect((x+offset.x)*blockSize,(y+offset.y)*blockSize,blockSize,blockSize);
          context.strokeStyle = 'rgba(255,255,255,.28)';
          context.lineWidth = 2;
          context.strokeRect((x+offset.x)*blockSize+1,(y+offset.y)*blockSize+1,blockSize-2,blockSize-2);
          context.fillStyle='rgba(255,255,255,.12)';
          context.fillRect((x+offset.x)*blockSize+3,(y+offset.y)*blockSize+3,blockSize-6,5);
        }
      });
    });
  }

  function drawGrid(){
    ctx.strokeStyle='rgba(255,255,255,.05)';
    ctx.lineWidth=1;
    for(let x=0;x<=COLS;x++){
      ctx.beginPath(); ctx.moveTo(x*BLOCK,0); ctx.lineTo(x*BLOCK,ROWS*BLOCK); ctx.stroke();
    }
    for(let y=0;y<=ROWS;y++){
      ctx.beginPath(); ctx.moveTo(0,y*BLOCK); ctx.lineTo(COLS*BLOCK,y*BLOCK); ctx.stroke();
    }
  }

  function draw(){
    ctx.fillStyle='#020812';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawGrid();
    drawMatrix(board,{x:0,y:0},ctx,BLOCK);
    if(player) drawMatrix(player.matrix,player.pos,ctx,BLOCK);
  }

  function drawNext(){
    nextCtx.fillStyle='#020812';
    nextCtx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
    const size=20;
    const w=nextPiece.matrix[0].length*size;
    const h=nextPiece.matrix.length*size;
    const ox=(nextCanvas.width-w)/2/size;
    const oy=(nextCanvas.height-h)/2/size;
    drawMatrix(nextPiece.matrix,{x:ox,y:oy},nextCtx,size);
  }

  function updateInfo(){
    document.getElementById('score').textContent=score;
    document.getElementById('lines').textContent=lines;
    document.getElementById('level').textContent=level;
  }

  function update(time=0){
    const delta=time-lastTime;
    lastTime=time;
    if(!paused && !gameOver){
      dropCounter += delta;
      const interval=Math.max(120,800-(level-1)*65);
      if(dropCounter>interval) playerDrop();
      draw();
    }
    animationId=requestAnimationFrame(update);
  }

  function startGame(){
    board=createBoard();
    nextPiece=randomPiece();
    score=0; lines=0; level=1;
    dropCounter=0; lastTime=0;
    paused=false; gameOver=false;
    document.getElementById('pauseBtn').textContent='Pausar';
    document.getElementById('overlay').classList.remove('show');
    updateInfo();
    resetPlayer();
    draw();
  }

  function togglePause(){
    if(gameOver) return;
    paused=!paused;
    document.getElementById('pauseBtn').textContent=paused?'Continuar':'Pausar';
    if(paused){
      document.getElementById('modalTitle').textContent='Jogo pausado';
      document.getElementById('modalText').textContent='Toque em continuar para voltar.';
      document.getElementById('playAgainBtn').textContent='Continuar';
      document.getElementById('overlay').classList.add('show');
    }else{
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('playAgainBtn').textContent='Jogar novamente';
    }
  }

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft') playerMove(-1);
    else if(e.key==='ArrowRight') playerMove(1);
    else if(e.key==='ArrowDown') playerDrop();
    else if(e.key==='ArrowUp') playerRotate();
    else if(e.code==='Space'){ e.preventDefault(); hardDrop(); }
    else if(e.key.toLowerCase()==='p') togglePause();
  });

  document.querySelectorAll('.control').forEach(btn=>{
    const action=btn.dataset.action;
    const act=()=>{
      if(action==='left') playerMove(-1);
      if(action==='right') playerMove(1);
      if(action==='rotate' && !paused && !gameOver) playerRotate();
      if(action==='down') playerDrop();
      if(action==='drop') hardDrop();
      draw();
    };
    btn.addEventListener('pointerdown',e=>{ e.preventDefault(); act(); });
  });

  document.getElementById('pauseBtn').addEventListener('click',togglePause);
  document.getElementById('restartBtn').addEventListener('click',startGame);
  document.getElementById('playAgainBtn').addEventListener('click',()=>{
    if(paused && !gameOver){
      togglePause();
    }else{
      document.getElementById('playAgainBtn').textContent='Jogar novamente';
      startGame();
    }
  });

  startGame();
  cancelAnimationFrame(animationId);
  update();
})();
</script>
</body>
</html>
